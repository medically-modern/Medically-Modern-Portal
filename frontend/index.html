<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medically Modern – Patient Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0B6E4F;
      --primary-light: #E8F5F0;
      --primary-mid: #D0EDE4;
      --primary-dark: #064A35;
      --accent: #2196A4;
      --accent-light: #E3F6F8;
      --surface: #FFFFFF;
      --bg: #F7FAF9;
      --text-primary: #1B2B3A;
      --text-secondary: #4A6274;
      --text-muted: #8A9DAD;
      --border: #E4EBF0;
      --border-light: #F0F4F3;
      --success: #0B6E4F;
      --success-bg: #E8F5F0;
      --current-glow: rgba(11, 110, 79, 0.12);
      --shadow-sm: 0 1px 3px rgba(27,43,58,0.04), 0 1px 2px rgba(27,43,58,0.06);
      --shadow-md: 0 4px 16px rgba(27,43,58,0.06), 0 1px 3px rgba(27,43,58,0.04);
      --shadow-lg: 0 8px 30px rgba(27,43,58,0.08), 0 2px 8px rgba(27,43,58,0.04);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      padding: 1rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.92);
    }
    .header-inner {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 20px; height: 20px; }
    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .logo-text span { color: var(--primary); }

    /* ─── Layout ─── */
    .container {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* ─── Login Card ─── */
    .login-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2.5rem 1.75rem;
      box-shadow: var(--shadow-md);
      margin-top: 2rem;
      text-align: center;
    }
    .login-icon {
      width: 56px; height: 56px;
      background: var(--primary-light);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .login-icon svg { width: 26px; height: 26px; color: var(--primary); }
    .login-card h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
      letter-spacing: -0.02em;
    }
    .login-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .input-group { position: relative; }
    .phone-input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s ease;
      background: var(--bg);
    }
    .phone-input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--current-glow);
    }
    .phone-input::placeholder { color: var(--text-muted); }
    .input-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .input-icon svg { width: 18px; height: 18px; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 0.85rem;
      transition: all 0.2s ease;
      letter-spacing: -0.01em;
    }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
    .error { color: #C53030; font-size: 0.82rem; margin-top: 0.65rem; display: none; background: #FFF5F5; padding: 0.5rem 0.75rem; border-radius: 6px; }

    /* ─── Loading ─── */
    #loading-view { display: none; text-align: center; padding-top: 4rem; }
    .loading-pulse {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--primary-light);
      margin: 0 auto 1.25rem;
      animation: pulse 1.4s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-pulse::after {
      content: '';
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulse-inner 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }
    @keyframes pulse-inner { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.8); } }
    .loading-text { color: var(--text-secondary); font-size: 0.9rem; }

    /* ─── Status View ─── */
    #status-view { display: none; }

    .welcome-banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      margin-top: 1.25rem;
      color: white;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -30%; right: -15%;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .welcome-banner::after {
      content: '';
      position: absolute;
      bottom: -40%; left: -10%;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .welcome-banner h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }
    .welcome-subtitle {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      padding: 0.5rem 0.9rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6EE7B7;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ─── Message card ─── */
    .message-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem 1.25rem;
      margin-top: 0.75rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    .message-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .message-card-header svg { width: 16px; height: 16px; color: var(--primary); flex-shrink: 0; }
    .message-card-header span {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .message-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* ─── Phase Sections ─── */
    .roadmap-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 1.5rem 0 0.6rem 0.25rem;
    }

    .phase-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 0;
      margin-top: 0.6rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .phase-card.active { box-shadow: var(--shadow-md); border-color: var(--primary-mid); }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
    }
    .phase-badge {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .phase-badge.completed { background: var(--success-bg); color: var(--success); }
    .phase-badge.current { background: var(--primary); color: white; }
    .phase-badge.upcoming { background: var(--border-light); color: var(--text-muted); }

    .phase-meta { flex: 1; }
    .phase-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .phase-title.completed { color: var(--success); }
    .phase-title.current { color: var(--text-primary); }
    .phase-title.upcoming { color: var(--text-muted); }

    .phase-progress {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    .phase-check { color: var(--success); flex-shrink: 0; }
    .phase-check svg { width: 18px; height: 18px; }

    /* ─── Stages ─── */
    .stages-list {
      padding: 0 1.25rem 0.5rem;
    }

    .stage-item {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.7rem 0;
      position: relative;
    }

    /* Vertical connector line */
    .stage-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 11px;
      top: 32px;
      bottom: -2px;
      width: 1.5px;
    }
    .stage-item.completed:not(:last-child)::after { background: var(--primary-mid); }
    .stage-item.current:not(:last-child)::after { background: linear-gradient(to bottom, var(--primary-mid), var(--border)); }
    .stage-item.upcoming:not(:last-child)::after { background: var(--border-light); }

    .stage-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      position: relative;
      z-index: 2;
      transition: all 0.2s ease;
    }
    .stage-dot svg { width: 12px; height: 12px; }
    .stage-dot.completed { background: var(--success-bg); color: var(--success); }
    .stage-dot.current {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 0 4px var(--current-glow), var(--shadow-sm);
    }
    .stage-dot.upcoming { background: var(--border-light); color: var(--text-muted); }

    .stage-content { flex: 1; min-width: 0; padding-bottom: 0.15rem; }
    .stage-name {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.35;
    }
    .stage-name.completed { color: var(--text-primary); }
    .stage-name.current { color: var(--primary); font-weight: 600; }
    .stage-name.upcoming { color: var(--text-muted); }

    .stage-detail {
      font-size: 0.78rem;
      line-height: 1.45;
      margin-top: 0.15rem;
    }
    .stage-detail.completed { color: var(--text-muted); }
    .stage-detail.current { color: var(--text-secondary); }
    .stage-detail.upcoming { color: var(--border); }

    /* ─── Footer ─── */
    .portal-footer {
      text-align: center;
      padding: 2rem 1rem 1rem;
      border-top: 1px solid var(--border-light);
      margin-top: 1rem;
    }
    .footer-text {
      color: var(--text-muted);
      font-size: 0.75rem;
      line-height: 1.6;
    }
    .footer-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    /* ─── Responsive ─── */
    @media (max-width: 380px) {
      .welcome-banner { padding: 1.5rem 1.25rem; }
      .welcome-banner h2 { font-size: 1.2rem; }
      .login-card { padding: 2rem 1.25rem; }
    }

    /* ─── Load Animations ─── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 0 0 4px var(--current-glow); }
      50% { box-shadow: 0 0 0 8px var(--current-glow); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0); }
      40% { transform: translateY(-3px); }
      60% { transform: translateY(-1px); }
    }

    .anim-entry {
      opacity: 0;
      animation: fadeSlideUp 0.4s ease-out forwards;
    }
    .anim-fade {
      opacity: 0;
      animation: fadeIn 0.35s ease-out forwards;
    }

    /* Phase-specific active stage effects (subtle) */
    .stage-dot.current.phase-1 {
      animation: softPulse 2.5s ease-in-out infinite;
    }
    .stage-dot.current.phase-2 {
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
    .stage-dot.current.phase-3 {
      animation: gentleBounce 2s ease-in-out infinite;
    }

    .welcome-banner {
      opacity: 0;
      animation: fadeSlideUp 0.45s ease-out forwards;
    }
    .message-card {
      opacity: 0;
      animation: fadeSlideUp 0.45s ease-out 0.1s forwards;
    }
    .roadmap-label {
      opacity: 0;
      animation: fadeIn 0.35s ease-out 0.2s forwards;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <div class="logo-text"><span>Medically</span> Modern</div>
    </div>
  </div>

  <div class="container">
    <!-- Login View -->
    <div id="login-view">
      <div class="login-card">
        <div class="login-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <h2>Check Your Status</h2>
        <p>Enter the phone number associated with your account to view your onboarding progress.</p>
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <input type="tel" id="phone" class="phone-input" placeholder="(555) 123-4567" maxlength="14">
        </div>
        <button class="btn" onclick="lookupByPhone()">View My Progress</button>
        <div class="error" id="error-msg"></div>
      </div>
    </div>

    <!-- Loading View -->
    <div id="loading-view">
      <div class="loading-pulse"></div>
      <p class="loading-text">Looking up your account...</p>
    </div>

    <!-- Status View -->
    <div id="status-view">
      <div class="welcome-banner" id="welcome-banner">
        <h2 id="patient-greeting">Hi!</h2>
        <div class="welcome-subtitle">Here's where things stand with your onboarding.</div>
        <div class="status-pill">
          <div class="status-dot"></div>
          <span id="status-pill-text">In Progress</span>
        </div>
      </div>

      <div class="message-card">
        <div class="message-card-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          <span>Latest Update</span>
        </div>
        <div class="message-text" id="current-message"></div>
      </div>

      <div class="roadmap-label">Your Roadmap</div>
      <div id="roadmap"></div>

      <div class="portal-footer">
        <div class="footer-text">
          Questions about your status?<br>
          Call us at <a href="tel:+18005550199">(800) 555-0199</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://patient-portal-backend-production.up.railway.app';

    const PHASES = [
      {
        number: 1,
        title: "Medical Review",
        stages: [
          { code: "0B", label: "Referral Received", desc: "Your referral has been received and your case is underway." },
          { code: "1B", label: "Working With Your Doctor", desc: "We're coordinating with your doctor for the documentation we need." },
          { code: "1D", label: "Awaiting Medical Records", desc: "Following up with your doctor's office to obtain your records." },
          { code: "1E", label: "Medical Review Complete", desc: "Your medical records have been reviewed and approved." }
        ]
      },
      {
        number: 2,
        title: "Insurance Verification",
        stages: [
          { code: "2C", label: "Authorization Pending", desc: "Prior authorization submitted to your insurance company." },
          { code: "2D", label: "Additional Info Requested", desc: "Your insurance requested more information before approval." },
          { code: "2E", label: "Insurance Approved", desc: "Your insurance has approved coverage for your equipment." }
        ]
      },
      {
        number: 3,
        title: "Welcome & Delivery",
        stages: [
          { code: "3A", label: "Scheduling Your Welcome Call", desc: "Our care team will reach out to finalize everything." },
          { code: "3C", label: "You're All Set!", desc: "Your equipment order is placed — delivery details coming soon." }
        ]
      }
    ];

    const ALL_CODES = PHASES.flatMap(p => p.stages.map(s => s.code));

    function getStageIndex(code) {
      const idx = ALL_CODES.indexOf(code);
      if (idx !== -1) return idx;
      const mapping = { '1A': 0, '1C': 2, '2A': 3, '2B': 3, '3B': 7 };
      return mapping[code] ?? 0;
    }

    // SVG templates
    const checkIcon = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5L6.5 11L12.5 5.5"/></svg>';
    const currentDot = '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3"/></svg>';
    const emptyCircle = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="4.5"/></svg>';
    const phaseCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>';

    async function init() {
      const uid = new URLSearchParams(window.location.search).get('p');
      if (uid) {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('loading-view').style.display = 'block';
        try {
          const res = await fetch(`${API_BASE}/api/status/uid/${uid}`);
          if (!res.ok) throw new Error('not found');
          renderStatus(await res.json());
        } catch {
          document.getElementById('loading-view').style.display = 'none';
          document.getElementById('login-view').style.display = 'block';
        }
      }
    }

    async function lookupByPhone() {
      const phone = document.getElementById('phone').value.replace(/\D/g, '');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (phone.length < 10) {
        errEl.textContent = 'Please enter a valid 10-digit phone number.';
        errEl.style.display = 'block';
        return;
      }

      document.getElementById('login-view').style.display = 'none';
      document.getElementById('loading-view').style.display = 'block';

      try {
        const res = await fetch(`${API_BASE}/api/status/${phone}`);
        if (!res.ok) throw new Error('not found');
        renderStatus(await res.json());
      } catch {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
        errEl.textContent = 'We couldn\'t find an account with that number. Please double-check and try again.';
        errEl.style.display = 'block';
      }
    }

    function renderStatus(data) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('loading-view').style.display = 'none';
      document.getElementById('status-view').style.display = 'block';

      const name = data.patient.name;
      document.getElementById('patient-greeting').textContent = `Hi ${name}!`;

      const stageCode = data.stage?.code || '0B';
      const currentIdx = getStageIndex(stageCode);
      const isComplete = stageCode === '3C';

      // Status pill
      const pillEl = document.getElementById('status-pill-text');
      if (isComplete) {
        pillEl.textContent = 'Complete';
      } else {
        const currentPhase = PHASES.find(p => p.stages.some(s => ALL_CODES.indexOf(s.code) >= currentIdx && ALL_CODES.indexOf(s.code) <= currentIdx + p.stages.length));
        pillEl.textContent = 'In Progress';
      }

      // Message
      let message = data.stage?.message;
      if (!message) {
        const nearestCode = ALL_CODES[Math.min(currentIdx, ALL_CODES.length - 1)];
        for (const phase of PHASES) {
          const s = phase.stages.find(st => st.code === nearestCode);
          if (s) { message = s.desc; break; }
        }
      }
      document.getElementById('current-message').textContent = message || 'Your case is being processed.';

      // Build roadmap
      const roadmap = document.getElementById('roadmap');
      roadmap.innerHTML = '';

      PHASES.forEach(phase => {
        const phaseIndices = phase.stages.map(s => ALL_CODES.indexOf(s.code));
        const lastInPhase = Math.max(...phaseIndices);
        const firstInPhase = Math.min(...phaseIndices);

        let phaseStatus;
        if (currentIdx > lastInPhase) phaseStatus = 'completed';
        else if (currentIdx >= firstInPhase) phaseStatus = 'current';
        else phaseStatus = 'upcoming';

        const completedCount = phase.stages.filter(s => ALL_CODES.indexOf(s.code) < currentIdx).length;
        const currentCount = phase.stages.filter(s => ALL_CODES.indexOf(s.code) === currentIdx).length;
        const doneCount = completedCount + currentCount;

        const card = document.createElement('div');
        card.className = `phase-card${phaseStatus === 'current' ? ' active' : ''}`;

        let progressText = '';
        if (phaseStatus === 'completed') progressText = 'Complete';
        else if (phaseStatus === 'current') progressText = `Step ${doneCount} of ${phase.stages.length}`;
        else progressText = `${phase.stages.length} steps`;

        let headerRight = '';
        if (phaseStatus === 'completed') {
          headerRight = `<div class="phase-check">${phaseCheck}</div>`;
        }

        card.innerHTML = `
          <div class="phase-header">
            <div class="phase-badge ${phaseStatus}">${phaseStatus === 'completed' ? '&#10003;' : phase.number}</div>
            <div class="phase-meta">
              <div class="phase-title ${phaseStatus}">${phase.title}</div>
              <div class="phase-progress">${progressText}</div>
            </div>
            ${headerRight}
          </div>
        `;

        const stagesList = document.createElement('div');
        stagesList.className = 'stages-list';

        phase.stages.forEach(stage => {
          const stageIdx = ALL_CODES.indexOf(stage.code);
          let status;
          if (stageIdx < currentIdx) status = 'completed';
          else if (stageIdx === currentIdx) status = 'current';
          else status = 'upcoming';

          const icon = status === 'completed' ? checkIcon : (status === 'current' ? currentDot : emptyCircle);

          const item = document.createElement('div');
          item.className = `stage-item ${status}`;
          const phaseClass = status === 'current' ? ` phase-${phase.number}` : '';
          item.innerHTML = `
            <div class="stage-dot ${status}${phaseClass}">${icon}</div>
            <div class="stage-content">
              <div class="stage-name ${status}">${stage.label}</div>
              <div class="stage-detail ${status}">${stage.desc}</div>
            </div>
          `;
          stagesList.appendChild(item);
        });

        card.appendChild(stagesList);
        const phaseDelay = 0.15 + (PHASES.indexOf(phase) * 0.12);
        card.style.opacity = '0';
        card.style.animation = `fadeSlideUp 0.4s ease-out ${phaseDelay}s forwards`;
        roadmap.appendChild(card);
      });
    }

    // Phone formatting
    document.getElementById('phone').addEventListener('input', function(e) {
      let val = this.value.replace(/\D/g, '');
      if (val.length > 10) val = val.slice(0, 10);
      if (val.length >= 6) this.value = `(${val.slice(0,3)}) ${val.slice(3,6)}-${val.slice(6)}`;
      else if (val.length >= 3) this.value = `(${val.slice(0,3)}) ${val.slice(3)}`;
      else if (val.length > 0) this.value = `(${val}`;
      else this.value = '';
    });

    document.getElementById('phone').addEventListener('keyup', e => {
      if (e.key === 'Enter') lookupByPhone();
    });

    init();
  </script>
</body>
</html>
