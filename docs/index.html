<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medically Modern – Patient Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      background: white;
      text-align: center;
      padding: 1.5rem 1rem 1rem;
      border-bottom: 1px solid #e2e8f0;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: #0066cc; }
    .subtitle { color: #5a6978; font-size: 0.85rem; margin-top: 0.25rem; }

    .container { max-width: 480px; width: 100%; padding: 0 1rem 2rem; }

    /* ─── Login view ─── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-top: 2rem;
      text-align: center;
    }
    .card h2 { font-size: 1.05rem; margin-bottom: 1rem; color: #334155; }
    .phone-input {
      width: 100%; padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0; border-radius: 8px;
      font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    .phone-input:focus { border-color: #0066cc; }
    .btn {
      width: 100%; padding: 0.75rem;
      background: #0066cc; color: white; border: none;
      border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 1rem; transition: background 0.2s;
    }
    .btn:hover { background: #0052a3; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ─── Loading ─── */
    #loading-view { display: none; text-align: center; margin-top: 3rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0; border-top-color: #0066cc;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Status view ─── */
    #status-view { display: none; }

    .greeting-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .greeting-card h2 {
      font-size: 1.2rem;
      color: #1a2332;
      margin-bottom: 0.35rem;
    }
    .current-message {
      background: #f0f7ff;
      border-left: 3px solid #0066cc;
      padding: 0.75rem 1rem;
      border-radius: 0 8px 8px 0;
      color: #334155;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-top: 0.75rem;
    }

    /* ─── Phase sections ─── */
    .phase-section {
      background: white;
      border-radius: 12px;
      padding: 1.25rem 1.25rem 0.75rem;
      margin-top: 0.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .phase-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }
    .phase-number {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .phase-number.completed { background: #10b981; }
    .phase-number.current { background: #0066cc; }
    .phase-number.upcoming { background: #cbd5e1; }
    .phase-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }
    .phase-title.completed { color: #10b981; }
    .phase-title.current { color: #0066cc; }
    .phase-title.upcoming { color: #94a3b8; }

    /* ─── Stage rows inside phase ─── */
    .stage-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.6rem 0;
      position: relative;
    }
    .stage-row:not(:last-child) { border-bottom: 1px solid #f1f5f9; }

    .stage-icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 0.7rem;
    }
    .stage-icon.completed { background: #d1fae5; color: #10b981; }
    .stage-icon.current { background: #dbeafe; color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,0.15); }
    .stage-icon.upcoming { background: #f1f5f9; color: #cbd5e1; }

    .stage-icon svg { width: 12px; height: 12px; }

    .stage-info { flex: 1; }
    .stage-label {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
    }
    .stage-label.completed { color: #334155; }
    .stage-label.current { color: #0066cc; font-weight: 600; }
    .stage-label.upcoming { color: #94a3b8; }

    .stage-desc {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 0.15rem;
      line-height: 1.4;
    }
    .stage-desc.upcoming { color: #cbd5e1; }

    /* ─── Footer ─── */
    .portal-footer {
      text-align: center;
      padding: 1.5rem 1rem;
      color: #94a3b8;
      font-size: 0.75rem;
    }

    /* ─── Error ─── */
    .error { color: #dc2626; font-size: 0.85rem; margin-top: 0.75rem; display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Medically Modern</div>
    <div class="subtitle">Patient Onboarding Portal</div>
  </div>

  <div class="container">
    <!-- Login View -->
    <div id="login-view">
      <div class="card">
        <h2>Check Your Status</h2>
        <input type="tel" id="phone" class="phone-input" placeholder="Enter your phone number" maxlength="14">
        <button class="btn" onclick="lookupByPhone()">Look Up</button>
        <div class="error" id="error-msg"></div>
      </div>
    </div>

    <!-- Loading View -->
    <div id="loading-view">
      <div class="spinner"></div>
      <p style="color:#5a6978;">Loading your status...</p>
    </div>

    <!-- Status View -->
    <div id="status-view">
      <div class="greeting-card">
        <h2 id="patient-greeting">Hi!</h2>
        <div class="current-message" id="current-message"></div>
      </div>
      <div id="roadmap"></div>
    </div>
  </div>

  <div class="portal-footer">
    Questions? Call us at (800) 555-0199
  </div>

  <script>
    const API_BASE = 'https://patient-portal-backend-production.up.railway.app';

    // All stages that send texts, in order, grouped by phase
    const PHASES = [
      {
        number: 1,
        title: "Medical Review",
        stages: [
          { code: "0B", label: "Referral Received", desc: "We received your referral and started your case." },
          { code: "1B", label: "Working With Your Doctor", desc: "Coordinating with your doctor for medical documentation." },
          { code: "1D", label: "Awaiting Medical Records", desc: "Following up with your doctor's office for records." },
          { code: "1E", label: "Medical Review Complete", desc: "Your medical records have been reviewed and approved." }
        ]
      },
      {
        number: 2,
        title: "Insurance Verification",
        stages: [
          { code: "2C", label: "Authorization Pending", desc: "Prior authorization submitted to your insurance." },
          { code: "2D", label: "Additional Info Requested", desc: "Insurance needs more information before approving." },
          { code: "2E", label: "Insurance Approved", desc: "Your insurance has approved your equipment." }
        ]
      },
      {
        number: 3,
        title: "Welcome & Delivery",
        stages: [
          { code: "3A", label: "Scheduling Your Welcome Call", desc: "Our care team will call to finalize everything." },
          { code: "3C", label: "You're All Set!", desc: "Equipment order placed — delivery details coming soon." }
        ]
      }
    ];

    // Flatten all stage codes in order for index comparison
    const ALL_CODES = PHASES.flatMap(p => p.stages.map(s => s.code));

    function getStageIndex(code) {
      const idx = ALL_CODES.indexOf(code);
      if (idx !== -1) return idx;
      // Non-visible stage — map by code prefix to approximate position
      // 1A=after 0B, 1C=after 1B, 2A/2B=before 2C, 3B=before 3C
      const mapping = { '1A': 0, '1C': 2, '2A': 3, '2B': 3, '3B': 7 };
      return mapping[code] ?? 0;
    }

    // SVG icons
    const checkSVG = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5L6.5 11.5L12.5 5"/></svg>';
    const dotSVG = '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3.5"/></svg>';
    const circleSVG = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/></svg>';

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get('p');

      if (uid) {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('loading-view').style.display = 'block';
        try {
          const res = await fetch(`${API_BASE}/api/status/uid/${uid}`);
          if (!res.ok) throw new Error('not found');
          const data = await res.json();
          renderStatus(data);
        } catch (err) {
          document.getElementById('loading-view').style.display = 'none';
          document.getElementById('login-view').style.display = 'block';
        }
      }
    }

    async function lookupByPhone() {
      const phone = document.getElementById('phone').value.replace(/\D/g, '');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (phone.length < 10) {
        errEl.textContent = 'Please enter a valid phone number.';
        errEl.style.display = 'block';
        return;
      }

      document.getElementById('login-view').style.display = 'none';
      document.getElementById('loading-view').style.display = 'block';

      try {
        const res = await fetch(`${API_BASE}/api/status/${phone}`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderStatus(data);
      } catch (err) {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
        errEl.textContent = 'We couldn\'t find your record. Please check your number and try again.';
        errEl.style.display = 'block';
      }
    }

    function renderStatus(data) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('loading-view').style.display = 'none';
      document.getElementById('status-view').style.display = 'block';

      // Greeting
      document.getElementById('patient-greeting').textContent = `Hi ${data.patient.name}!`;

      // Current message
      const msgEl = document.getElementById('current-message');
      const currentCode = data.stage?.code || '0B';
      const currentIdx = getStageIndex(currentCode);

      // Find the best message to show
      let displayMessage = data.stage?.message;
      if (!displayMessage) {
        // Find the nearest stage description
        const nearestCode = ALL_CODES[currentIdx];
        for (const phase of PHASES) {
          const s = phase.stages.find(st => st.code === nearestCode);
          if (s) { displayMessage = s.desc; break; }
        }
      }
      msgEl.textContent = displayMessage || 'Your case is being processed.';

      // Build roadmap
      const roadmap = document.getElementById('roadmap');
      roadmap.innerHTML = '';

      PHASES.forEach(phase => {
        const section = document.createElement('div');
        section.className = 'phase-section';

        // Determine phase status
        const phaseStageIndices = phase.stages.map(s => ALL_CODES.indexOf(s.code));
        const lastInPhase = Math.max(...phaseStageIndices);
        const firstInPhase = Math.min(...phaseStageIndices);

        let phaseStatus;
        if (currentIdx > lastInPhase) phaseStatus = 'completed';
        else if (currentIdx >= firstInPhase) phaseStatus = 'current';
        else phaseStatus = 'upcoming';

        section.innerHTML = `
          <div class="phase-header">
            <div class="phase-number ${phaseStatus}">${phase.number}</div>
            <div class="phase-title ${phaseStatus}">${phase.title}</div>
          </div>
        `;

        phase.stages.forEach(stage => {
          const stageIdx = ALL_CODES.indexOf(stage.code);
          let status;
          if (stageIdx < currentIdx) status = 'completed';
          else if (stageIdx === currentIdx) status = 'current';
          else status = 'upcoming';

          const row = document.createElement('div');
          row.className = 'stage-row';

          const icon = status === 'completed' ? checkSVG : (status === 'current' ? dotSVG : circleSVG);

          row.innerHTML = `
            <div class="stage-icon ${status}">${icon}</div>
            <div class="stage-info">
              <div class="stage-label ${status}">${stage.label}</div>
              <div class="stage-desc ${status}">${stage.desc}</div>
            </div>
          `;

          section.appendChild(row);
        });

        roadmap.appendChild(section);
      });
    }

    document.getElementById('phone').addEventListener('keyup', e => {
      if (e.key === 'Enter') lookupByPhone();
    });

    init();
  </script>
</body>
</html>
